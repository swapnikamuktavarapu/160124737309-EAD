<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Student Registration Form</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center">Student Registration Form</h2>

    <!-- Alert -->
    <div id="successAlert" class="alert alert-success d-none">
        Form submitted successfully!
    </div>

    <form onsubmit="showAlert(event)">

        <div class="row">

            <!-- Student Name -->
            <div class="col-md-6 mb-3">
                <label class="form-label">Student Name</label>
                <input type="text" class="form-control" required>
            </div>

            <!-- Roll Number -->
            <div class="col-md-6 mb-3">
                <label class="form-label">Roll Number</label>
                <input type="text" class="form-control" required>
            </div>

            <!-- Email -->
            <div class="col-md-6 mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" required>
            </div>

            <!-- Department -->
            <div class="col-md-6 mb-3">
                <label class="form-label">Department</label>
                <select class="form-select" required>
                    <option value="">Select Department</option>
                    <option>CSE</option>
                    <option>ECE</option>
                    <option>EEE</option>
                    <option>MECH</option>
                </select>
            </div>

            <!-- Gender -->
            <div class="col-md-6 mb-3">
                <label class="form-label d-block">Gender</label>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender">
                    <label class="form-check-label">Male</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender">
                    <label class="form-check-label">Female</label>
                </div>
            </div>

            <!-- Subjects -->
            <div class="col-md-6 mb-3">
                <label class="form-label d-block">Subjects</label>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox">
                    <label class="form-check-label">DBMS</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox">
                    <label class="form-check-label">EAD</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox">
                    <label class="form-check-label">PQT</label>
                </div>
            </div>

            <!-- Upload Photo -->
            <div class="col-12 mb-3">
                <label class="form-label">Upload Photo</label>
                <input type="file" class="form-control">
            </div>

        </div>

        <!-- Buttons -->
        <button type="submit" class="btn btn-primary">Submit</button>
        <button type="reset" class="btn btn-secondary">Reset</button>

    </form>

</div>

<!-- JS for Alert -->
<script>
function showAlert(event) {
    event.preventDefault();
    document.getElementById("successAlert").classList.remove("d-none");
}
</script>

</body>
</html>
